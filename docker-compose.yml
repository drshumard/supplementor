
services:
  app:
    build:
      context: .
      args:
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    container_name: drshumard-protocol
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3800}:80"
    env_file:
      - backend/.env
    environment:
      # Override backend/.env so the container talks to the compose mongo service,
      # not whatever host-local URL is in backend/.env for bare-metal deploys.
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/drshumard_protocol}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: drshumard-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27018}:27017"

volumes:
  mongo_data:
